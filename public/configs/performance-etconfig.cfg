// RTCW:ET Performance Config
// Maximum FPS for low-end machines

// Network — optimized for stability
seta rate "25000"
seta snaps "20"
seta cl_maxpackets "60"

// Graphics — minimum for max FPS
seta com_maxfps "125"
seta r_mode "4"
seta r_fullscreen "1"
seta r_dynamiclight "0"
seta r_drawfoliage "0"
seta cg_shadows "0"
seta cg_marktime "0"
seta cg_coronas "0"
seta cg_wolfparticles "0"
seta r_detailtextures "0"
seta r_fastsky "1"
seta r_picmip "3"
seta r_texturebits "16"
seta r_colorbits "16"
seta r_lodbias "2"
seta r_subdivisions "20"
seta cg_brasstime "0"
seta r_primitives "2"
seta r_ext_compressed_textures "1"

// Memory — reduced
seta com_hunkmegs "128"
seta com_soundmegs "24"
seta com_zonemegs "24"

// Sound — minimal
seta s_volume "0.5"
seta s_musicvolume "0"
seta s_doppler "0"
seta s_khz "22"

// Disable all effects
seta cg_gibs "0"
seta cg_bloodflash "0"
seta cg_blooddamageblend "0"
seta cg_atmosphericeffects "0"
seta cg_showblood "0"
