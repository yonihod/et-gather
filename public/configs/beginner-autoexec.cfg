// RTCW:ET Beginner Config
// Comfortable defaults for new or returning players

// Network
seta rate "25000"
seta snaps "20"
seta cl_maxpackets "60"

// Graphics — balanced quality
seta com_maxfps "60"
seta r_dynamiclight "1"
seta cg_shadows "1"
seta r_fastsky "0"
seta cg_wolfparticles "1"

// Controls
seta cl_mouseAccel "0"
seta sensitivity "3"

// HUD — helpful for new players
seta cg_drawfps "1"
seta cg_drawteamoverlay "2"
seta cg_crosshairsize "48"
seta cg_crosshaircolor "white"
seta cg_crosshairhealth "1"
seta cg_drawcompass "1"

// Sound
seta s_volume "0.7"
seta s_musicvolume "0.3"

// Chat
seta cg_teamchattime "8000"
seta cg_novoicechats "0"
