// RTCW:ET Competitive Config
// Optimized for competitive play — high FPS, clean visuals, responsive controls

// Network
seta rate "25000"
seta snaps "40"
seta cl_maxpackets "100"
seta cl_timenudge "0"

// Graphics — clean and fast
seta com_maxfps "125"
seta r_displayrefresh "125"
seta r_primitives "2"
seta r_dynamiclight "0"
seta r_drawfoliage "0"
seta cg_shadows "0"
seta cg_marktime "0"
seta cg_coronas "0"
seta cg_wolfparticles "0"
seta r_detailtextures "0"
seta r_fastsky "1"

// Controls — responsive
seta cl_mouseAccel "0"
seta m_filter "0"
seta cl_maxfps "125"
seta com_hunkmegs "512"

// HUD
seta cg_drawfps "1"
seta cg_lagometer "1"
seta cg_drawteamoverlay "2"
seta cg_crosshairsize "40"
seta cg_crosshaircolor "white"
seta cg_crosshairhealth "0"

// Sound
seta s_volume "0.6"
seta s_musicvolume "0"
seta s_doppler "0"

// Misc
seta cg_gibs "0"
seta cg_bloodflash "0"
seta cg_blooddamageblend "0"
