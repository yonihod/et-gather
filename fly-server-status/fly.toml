app = 'et-server-status'
primary_region = 'ams'

[build]

[processes]
  worker = 'sh poll.sh'

[[services]]
  internal_port = 8080
  protocol = 'tcp'
  processes = ['worker']
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.http_checks]]
    interval = 30000
    timeout = 5000
    path = '/'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
